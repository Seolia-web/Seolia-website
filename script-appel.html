<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Script Appel — Seolia</title>
<meta name="robots" content="noindex,nofollow">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e8eaf0;
    --muted: #7b7f94;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --accent: #6366f1;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* ── PRE-CALL FORM ── */
  #precall {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }
  .precall-logo { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 32px; }
  .precall-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; text-align: center; }
  .precall-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; text-align: center; }
  .form-group { width: 100%; max-width: 400px; margin-bottom: 16px; }
  .form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 13px 16px;
    font-size: 15px; outline: none; -webkit-appearance: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--card); }
  .btn-start {
    width: 100%; max-width: 400px; margin-top: 8px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.5px;
  }
  .btn-start:active { opacity: 0.85; }

  /* ── SCRIPT VIEW ── */
  #script-view { display: none; flex-direction: column; min-height: 100vh; }

  /* Contact mini-bar */
  .contact-bar {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .contact-bar-name { font-weight: 700; font-size: 14px; }
  .contact-bar-detail { font-size: 12px; color: var(--muted); }
  .contact-bar-sep { color: var(--border); }
  .bar-edit { font-size: 11px; color: var(--accent); cursor: pointer; margin-left: auto; }

  /* Main step area */
  .step-area {
    flex: 1; display: flex; flex-direction: column;
    padding: 24px 20px 20px;
    max-width: 480px; width: 100%; margin: 0 auto;
  }

  .step-tag {
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--muted); margin-bottom: 14px;
  }
  .step-say {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
    font-size: 17px; line-height: 1.55; font-style: italic;
    color: var(--text); margin-bottom: 20px; flex-shrink: 0;
  }
  .step-say strong { font-style: normal; color: #fff; }

  /* Collect field (appears mid-conversation) */
  .collect-field {
    margin-bottom: 18px;
    background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.3);
    border-radius: 10px; padding: 14px 16px;
  }
  .collect-field label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); display: block; margin-bottom: 6px; }
  .collect-field input { background: transparent; border: none; color: var(--text); font-size: 15px; width: 100%; outline: none; }

  /* Tip */
  .tip-toggle { font-size: 12px; color: var(--muted); cursor: pointer; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .tip-content { display: none; font-size: 13px; color: var(--muted); background: rgba(255,255,255,0.04); border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; line-height: 1.5; }
  .tip-content.open { display: block; }

  /* Choices */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    width: 100%; border: none; border-radius: 12px; padding: 15px 18px;
    font-size: 15px; font-weight: 600; cursor: pointer; text-align: left;
    transition: opacity 0.15s, transform 0.1s;
  }
  .choice-btn:active { opacity: 0.8; transform: scale(0.98); }
  .choice-btn.green  { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .choice-btn.orange { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .choice-btn.red    { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
  .choice-btn.blue   { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }

  /* Back button */
  .btn-back { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 4px; margin-top: 20px; }

  /* ── OUTCOME SCREEN ── */
  #outcome-screen {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px 20px;
  }
  .outcome-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; text-align: center; }
  .outcome-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; text-align: center; }
  .outcome-tabs { display: flex; gap: 8px; margin-bottom: 28px; width: 100%; max-width: 400px; }
  .outcome-tab {
    flex: 1; padding: 12px 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-size: 13px; font-weight: 600;
    cursor: pointer; text-align: center;
  }
  .outcome-tab.active.rdv    { background: rgba(34,197,94,0.15);  color: #4ade80; border-color: rgba(34,197,94,0.4); }
  .outcome-tab.active.rappel { background: rgba(59,130,246,0.15); color: #60a5fa; border-color: rgba(59,130,246,0.4); }
  .outcome-tab.active.non    { background: rgba(239,68,68,0.12);  color: #f87171; border-color: rgba(239,68,68,0.3); }

  .outcome-form { width: 100%; max-width: 400px; }
  .outcome-form .form-group { margin-bottom: 14px; }
  .outcome-form textarea {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 13px 16px;
    font-size: 14px; outline: none; resize: none; min-height: 80px;
    font-family: inherit;
  }
  .outcome-form textarea:focus { border-color: var(--accent); }

  .datetime-row { display: flex; gap: 10px; }
  .datetime-row .form-group { flex: 1; }

  .btn-create {
    width: 100%; border: none; border-radius: 12px; padding: 16px;
    font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
  }
  .btn-create.rdv    { background: var(--green); color: #fff; }
  .btn-create.rappel { background: var(--blue); color: #fff; }
  .btn-create.non    { background: var(--border); color: var(--muted); }
  .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── SUCCESS ── */
  #success-screen {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px 20px; text-align: center;
  }
  .success-icon { font-size: 56px; margin-bottom: 20px; }
  .success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
  .btn-new-call {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 14px 28px; font-size: 15px; cursor: pointer;
  }
  .btn-crm {
    background: var(--accent); color: #fff;
    border: none; border-radius: 12px; padding: 14px 28px; font-size: 15px; cursor: pointer;
    margin-bottom: 12px; width: 100%; max-width: 300px;
  }

  /* Progress dots */
  .progress-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .dot.active { background: var(--accent); }
  .dot.done   { background: var(--green); }
</style>
</head>
<body>

<!-- ═══════════════════════════════ PRE-CALL FORM ═══════════════════════════════ -->
<div id="precall">
  <div class="precall-logo">Seolia</div>
  <div class="precall-title">Avant d'appeler</div>
  <div class="precall-sub">Remplis les infos que tu as déjà</div>

  <div class="form-group">
    <label>Entreprise *</label>
    <input type="text" id="f-entreprise" placeholder="Ex: Plomberie Dupont" autocomplete="off">
  </div>
  <div class="form-group">
    <label>Téléphone *</label>
    <input type="tel" id="f-telephone" placeholder="+32 4XX XX XX XX">
  </div>
  <div class="form-group">
    <label>Secteur</label>
    <select id="f-secteur">
      <option value="">— Sélectionner —</option>
      <option value="Plombier">🔧 Plombier</option>
      <option value="Électricien">⚡ Électricien</option>
      <option value="Serrurier">🔑 Serrurier</option>
      <option value="Débouchage">🚿 Débouchage</option>
      <option value="Toiture">🏠 Toiture / Couverture</option>
      <option value="Garage / Carrossier">🚗 Garage / Carrossier</option>
      <option value="Peintre">🎨 Peintre</option>
      <option value="Menuisier">🪟 Menuisier</option>
      <option value="Boucher">🥩 Boucher</option>
      <option value="Coiffeur">✂️ Coiffeur</option>
      <option value="Autre">Autre</option>
    </select>
  </div>
  <div class="form-group">
    <label>Ville</label>
    <input type="text" id="f-ville" placeholder="Ex: Liège">
  </div>

  <button class="btn-start" onclick="startCall()">📞 Commencer l'appel</button>
</div>

<!-- ═══════════════════════════════ SCRIPT VIEW ═══════════════════════════════ -->
<div id="script-view">
  <!-- Contact bar -->
  <div class="contact-bar">
    <div>
      <div class="contact-bar-name" id="bar-name">—</div>
      <div class="contact-bar-detail" id="bar-detail">—</div>
    </div>
    <span class="bar-edit" onclick="goBack()">✏️ Modifier</span>
  </div>

  <!-- Step area -->
  <div class="step-area">
    <div class="progress-dots" id="progress-dots">
      <div class="dot active" id="dot-0"></div>
      <div class="dot" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
      <div class="dot" id="dot-3"></div>
      <div class="dot" id="dot-4"></div>
    </div>

    <div class="step-tag" id="step-tag">INTRO</div>
    <div class="step-say" id="step-say">...</div>

    <!-- Optional collect field -->
    <div class="collect-field" id="collect-wrap" style="display:none">
      <label id="collect-label">Prénom</label>
      <input type="text" id="collect-input" placeholder="Note ici...">
    </div>

    <!-- Tip toggle -->
    <div class="tip-toggle" id="tip-toggle" onclick="toggleTip()">
      <span>💡</span><span id="tip-label">Conseil</span>
    </div>
    <div class="tip-content" id="tip-content"></div>

    <div class="choices" id="choices"></div>

    <button class="btn-back" id="btn-back" onclick="goBack()">← Retour</button>
  </div>
</div>

<!-- ═══════════════════════════════ OUTCOME SCREEN ═══════════════════════════════ -->
<div id="outcome-screen">
  <div class="outcome-title">Résultat de l'appel</div>
  <div class="outcome-sub" id="outcome-sub">Comment ça s'est terminé ?</div>

  <div class="outcome-tabs">
    <div class="outcome-tab rdv" id="tab-rdv" onclick="selectOutcome('rdv')">✅ RDV</div>
    <div class="outcome-tab rappel" id="tab-rappel" onclick="selectOutcome('rappel')">📞 Rappel</div>
    <div class="outcome-tab non" id="tab-non" onclick="selectOutcome('non')">❌ Pas int.</div>
  </div>

  <div class="outcome-form" id="outcome-form">
    <!-- RDV -->
    <div id="form-rdv" style="display:none">
      <div class="datetime-row">
        <div class="form-group">
          <label>Date du RDV</label>
          <input type="date" id="rdv-date">
        </div>
        <div class="form-group">
          <label>Heure</label>
          <input type="time" id="rdv-time" value="10:00">
        </div>
      </div>
      <div class="form-group">
        <label>Prénom du contact (si noté)</label>
        <input type="text" id="rdv-prenom" placeholder="Ex: Jean">
      </div>
      <div class="form-group">
        <label>Note (optionnel)</label>
        <textarea id="rdv-note" placeholder="Infos utiles pour le RDV..."></textarea>
      </div>
      <button class="btn-create rdv" onclick="createContact('rdv')">✅ Créer la fiche CRM</button>
    </div>

    <!-- RAPPEL -->
    <div id="form-rappel" style="display:none">
      <div class="datetime-row">
        <div class="form-group">
          <label>Date de rappel</label>
          <input type="date" id="rappel-date">
        </div>
        <div class="form-group">
          <label>Heure</label>
          <input type="time" id="rappel-time" value="10:00">
        </div>
      </div>
      <div class="form-group">
        <label>Prénom du contact (si noté)</label>
        <input type="text" id="rappel-prenom" placeholder="Ex: Jean">
      </div>
      <div class="form-group">
        <label>Note</label>
        <textarea id="rappel-note" placeholder="Pourquoi rappeler ? Qu'a-t-il dit ?"></textarea>
      </div>
      <button class="btn-create rappel" onclick="createContact('rappel')">📞 Créer la fiche CRM</button>
    </div>

    <!-- PAS INTERESSE -->
    <div id="form-non" style="display:none">
      <div class="form-group">
        <label>Raison (optionnel)</label>
        <select id="non-raison">
          <option value="Pas intéressé">Pas intéressé</option>
          <option value="Déjà quelqu'un">Déjà quelqu'un</option>
          <option value="Pas le bon moment">Pas le bon moment</option>
          <option value="Contrat en cours (Trustup/Bobex)">Contrat en cours</option>
          <option value="Mauvais contact / pas décideur">Pas le décideur</option>
          <option value="Ne répond pas">Ne répond pas</option>
        </select>
      </div>
      <button class="btn-create non" onclick="createContact('non')">Terminer sans fiche</button>
    </div>
  </div>

  <button class="btn-back" style="margin-top:20px" onclick="showStep(history[history.length-1])">← Retour</button>
</div>

<!-- ═══════════════════════════════ SUCCESS ═══════════════════════════════ -->
<div id="success-screen">
  <div class="success-icon" id="success-icon">✅</div>
  <div class="success-title" id="success-title">Fiche créée !</div>
  <div class="success-sub" id="success-sub">Le contact a été ajouté au CRM avec le suivi.</div>
  <button class="btn-crm" onclick="window.open('https://seolia.be/admin.html','_blank')">Ouvrir le CRM</button>
  <button class="btn-new-call" onclick="resetAll()">📞 Nouvel appel</button>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const contact = { entreprise: '', telephone: '', secteur: '', ville: '', prenom: '' };
let currentStep = 'intro';
let history = [];
let outcomeType = null;

const WORKER_URL = 'https://seolia-ai-chat.florian-seolia.workers.dev';

// Step dots mapping
const STEP_ORDER = ['intro','transition','q1','q2','closing'];

const steps = {

  intro: {
    tag: '📞 INTRODUCTION',
    dot: 0,
    say: () => `Bonjour — c'est bien <strong>${contact.entreprise || '[Entreprise]'}</strong> ? ... Vous gérez la partie clients ?`,
    tip: "Ton seul but ici : confirmer que t'as le bon numéro et le bon interlocuteur. Rien d'autre.",
    choices: [
      { text: '✅ Oui, c\'est moi', next: 'transition', style: 'green' },
      { text: '👤 Non, je le passe', next: 'intro', style: 'orange', note: 'Attends le décideur' },
      { text: '📵 Pas disponible', next: 'fin_dispo', style: 'red' },
    ]
  },

  transition: {
    tag: '💬 TRANSITION',
    dot: 1,
    say: () => `Je travaille avec des ${contact.secteur || '[secteur]'} dans la région — avant d'expliquer pourquoi j'appelle, c'est quoi votre activité principale ?`,
    tip: "Écoute pour de vrai. Rebondis sur ce qu'il dit avant de poser Q1. Le 'Et' qui suit doit sonner naturel.",
    collect: { label: '✏️ Prénom du contact', field: 'prenom', placeholder: 'Note le prénom...' },
    choices: [
      { text: 'Il a répondu → continuer', next: 'q1', style: 'green' },
    ]
  },

  q1: {
    tag: '❓ Q1 — SOURCE CLIENTS',
    dot: 2,
    say: () => `Et vos nouveaux clients, ils vous trouvent comment en ce moment ?`,
    tip: "Silence après la question. Laisse-le répondre. Ne propose pas de réponse. S'il hésite, attends encore.",
    choices: [
      { text: '🗣️ Bouche-à-oreille / réseau', next: 'q2_bao', style: 'orange' },
      { text: '📋 Bobex / Trustup / plateforme', next: 'q2_bobex', style: 'orange' },
      { text: '🌐 Google / site web', next: 'q2_site', style: 'green' },
      { text: '📊 Plusieurs canaux', next: 'q2_bao', style: 'orange' },
    ]
  },

  q2_bao: {
    tag: '🎯 Q2 — TEST GOOGLE',
    dot: 3,
    say: () => `Si quelqu'un cherche un ${contact.secteur?.toLowerCase() || '[métier]'} à ${contact.ville || '[ville]'} sur Google ce soir... il tombe sur vous ?`,
    tip: "Pause. Laisse le silence travailler. La plupart ne savent pas répondre — c'est déjà la vente.",
    choices: [
      { text: '✅ Oui, j\'ai un site / je suis visible', next: 'q3_conversion', style: 'green' },
      { text: '❓ Je sais pas trop', next: 'closing_invisible', style: 'orange' },
      { text: '❌ Non / pas de site', next: 'closing_invisible', style: 'red' },
    ]
  },

  q2_bobex: {
    tag: '🎯 Q2 — BOBEX / PLATEFORME',
    dot: 3,
    say: () => `Et en dehors de Bobex — si quelqu'un cherche directement sur Google, il vous trouve ?`,
    tip: "Leur faire réaliser qu'ils dépendent d'une plateforme payante qu'ils ne contrôlent pas.",
    choices: [
      { text: '✅ Oui, j\'ai aussi un site', next: 'q3_conversion', style: 'green' },
      { text: '❌ Non, juste Bobex', next: 'closing_bobex', style: 'orange' },
    ]
  },

  q2_site: {
    tag: '🎯 Q2 — SITE EXISTANT',
    dot: 3,
    say: () => `Super — et ça vous génère combien d'appels par mois environ, via Google ?`,
    tip: "S'ils ne savent pas → ne dis rien. Ce silence est le meilleur moment du call. Laisse-le réaliser.",
    choices: [
      { text: '📈 Plusieurs appels / ça marche bien', next: 'closing_bien', style: 'green' },
      { text: '🤔 Pas beaucoup / je sais pas', next: 'closing_invisible', style: 'orange' },
      { text: '📉 Quasi rien', next: 'closing_invisible', style: 'red' },
    ]
  },

  q3_conversion: {
    tag: '📊 Q3 — CONVERSION',
    dot: 3,
    say: () => `Et sur ces appels Google — vous en perdez beaucoup parce que vous étiez pas disponible au moment où ça sonnait ?`,
    tip: "Ouvre la question de la disponibilité et des appels manqués. Prépare le terrain pour l'IA.",
    choices: [
      { text: '😓 Oui ça arrive', next: 'closing_ia', style: 'orange' },
      { text: '✅ Non j\'ai quelqu\'un', next: 'closing_bien', style: 'green' },
    ]
  },

  closing_invisible: {
    tag: '🚀 CLOSING — INVISIBLE',
    dot: 4,
    say: () => `C'est exactement ce sur quoi je travaille. Je suis dans le coin ${contact.ville ? 'côté ' + contact.ville : 'dans la région'} — je passe vous montrer votre situation en 20 minutes chrono. Pas de présentation, juste les chiffres concrets de votre zone. Vous êtes là plutôt le matin ou l'après-midi ?`,
    tip: "Pas 'je vous propose' — tu annonces une visite. Le 'plutôt matin ou après-midi' présuppose qu'il dit oui.",
    choices: [
      { text: '✅ RDV confirmé', next: '__rdv__', style: 'green' },
      { text: '🤔 Il hésite', next: 'objection_temps', style: 'orange' },
      { text: '❌ Non catégorique', next: 'objection_non', style: 'red' },
    ]
  },

  closing_bobex: {
    tag: '🚀 CLOSING — BOBEX',
    dot: 4,
    say: () => `Le problème avec Bobex c'est que si demain ils augmentent leurs prix ou ferment — vous avez rien. Je passe vous montrer comment avoir votre propre visibilité Google en 20 minutes. Vous êtes là plutôt le matin ou l'après-midi ?`,
    tip: "Ne dénigre pas Bobex — pose juste la question de la dépendance. Il l'a senti lui-même.",
    choices: [
      { text: '✅ RDV confirmé', next: '__rdv__', style: 'green' },
      { text: '🤔 Il hésite', next: 'objection_temps', style: 'orange' },
      { text: '❌ Non catégorique', next: 'objection_non', style: 'red' },
    ]
  },

  closing_ia: {
    tag: '🚀 CLOSING — IA',
    dot: 4,
    say: () => `On travaille justement sur ça — site optimisé Google + agent IA qui répond à votre place quand vous êtes sur chantier. Je passe vous montrer en 20 minutes. Matin ou après-midi ?`,
    tip: "Il vient de te dire lui-même qu'il perd des appels. Tu ne vends rien — tu proposes une solution à son problème.",
    choices: [
      { text: '✅ RDV confirmé', next: '__rdv__', style: 'green' },
      { text: '🤔 Il hésite', next: 'objection_temps', style: 'orange' },
      { text: '❌ Non catégorique', next: 'objection_non', style: 'red' },
    ]
  },

  closing_bien: {
    tag: '💡 CLOSING — SATISFAIT',
    dot: 4,
    say: () => `Super — dans ce cas je vais pas vous faire perdre du temps. Une dernière chose : est-ce que vous savez combien de recherches Google ont été faites pour votre métier à ${contact.ville || '[ville]'} le mois dernier ?`,
    tip: "S'il dit non → 'C'est ça que je viens vous montrer.' Même les satisfaits sont curieux des chiffres.",
    choices: [
      { text: '😮 Non, dites-moi', next: 'closing_invisible', style: 'orange' },
      { text: '✅ RDV confirmé', next: '__rdv__', style: 'green' },
      { text: '❌ Vraiment pas intéressé', next: '__non__', style: 'red' },
    ]
  },

  objection_temps: {
    tag: '🛡️ OBJECTION — PAS LE TEMPS',
    dot: 4,
    say: () => `Je comprends — c'est pour ça que je dis 20 minutes chrono. Pas de présentation, pas de vente. Juste les chiffres de votre zone. Si ça vous intéresse pas après 20 minutes, on s'arrête là. Vous avez 20 minutes cette semaine ?`,
    tip: "Ne défends pas ton offre — défends juste le temps. 20 minutes c'est une pause café.",
    choices: [
      { text: '✅ OK pour 20 minutes', next: '__rdv__', style: 'green' },
      { text: '❌ Non vraiment pas', next: 'objection_non', style: 'red' },
    ]
  },

  objection_non: {
    tag: '🛡️ OBJECTION — NON CATÉGORIQUE',
    dot: 4,
    say: () => `Pas de souci — je note quand même votre contact. Si vous cherchez à développer votre visibilité dans les prochains mois, vous saurez où me trouver. Bonne continuation.`,
    tip: "Ne force jamais. Un non aujourd'hui peut devenir un oui dans 3 mois. Reste pro et sympathique.",
    choices: [
      { text: '📞 Prévoir un rappel dans quelques semaines', next: '__rappel__', style: 'blue' },
      { text: '❌ Clôturer sans suite', next: '__non__', style: 'red' },
    ]
  },

  fin_dispo: {
    tag: '⏰ PAS DISPONIBLE',
    dot: 0,
    say: () => `D'accord — je rappelle quand ?`,
    tip: "Note l'heure et rappelle exactement à l'heure dite. C'est ce qui te différencie.",
    choices: [
      { text: '📞 Prévoir un rappel', next: '__rappel__', style: 'blue' },
      { text: '❌ Pas de suite', next: '__non__', style: 'red' },
    ]
  },

};

// ── INIT ─────────────────────────────────────────────────────────────────────
function startCall() {
  const ent = document.getElementById('f-entreprise').value.trim();
  const tel = document.getElementById('f-telephone').value.trim();
  if (!ent || !tel) { alert('Remplis au moins l\'entreprise et le téléphone'); return; }

  contact.entreprise = ent;
  contact.telephone  = tel;
  contact.secteur    = document.getElementById('f-secteur').value;
  contact.ville      = document.getElementById('f-ville').value.trim();

  updateBar();
  document.getElementById('precall').style.display = 'none';
  document.getElementById('script-view').style.display = 'flex';
  showStep('intro');
}

function updateBar() {
  document.getElementById('bar-name').textContent = contact.entreprise || '—';
  const parts = [contact.prenom, contact.secteur, contact.ville].filter(Boolean);
  document.getElementById('bar-detail').textContent = parts.join(' · ') || '—';
}

// ── STEP RENDERING ───────────────────────────────────────────────────────────
function showStep(id) {
  // Handle special terminal steps
  if (id === '__rdv__')    { showOutcome('rdv');    return; }
  if (id === '__rappel__') { showOutcome('rappel'); return; }
  if (id === '__non__')    { showOutcome('non');    return; }

  // Save collect field before switching
  saveCollect();

  if (currentStep !== id) history.push(currentStep);
  currentStep = id;

  const step = steps[id];
  if (!step) return;

  // Update dots
  const dotIdx = step.dot ?? 0;
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot' + (i < dotIdx ? ' done' : i === dotIdx ? ' active' : '');
  });

  // Tag & say
  document.getElementById('step-tag').textContent = step.tag || '';
  document.getElementById('step-say').innerHTML = typeof step.say === 'function' ? step.say() : step.say;

  // Collect field
  const collectWrap = document.getElementById('collect-wrap');
  if (step.collect) {
    collectWrap.style.display = 'block';
    document.getElementById('collect-label').textContent = step.collect.label;
    document.getElementById('collect-input').placeholder = step.collect.placeholder || '';
    document.getElementById('collect-input').value = contact[step.collect.field] || '';
    document.getElementById('collect-input')._field = step.collect.field;
  } else {
    collectWrap.style.display = 'none';
  }

  // Tip
  const tipContent = document.getElementById('tip-content');
  tipContent.textContent = step.tip || '';
  tipContent.classList.remove('open');
  document.getElementById('tip-toggle').style.display = step.tip ? 'flex' : 'none';

  // Choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  (step.choices || []).forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn ' + (c.style || 'blue');
    btn.textContent = c.text;
    btn.onclick = () => { saveCollect(); showStep(c.next); };
    choicesEl.appendChild(btn);
  });

  // Back button
  document.getElementById('btn-back').style.display = history.length > 0 ? 'flex' : 'none';
}

function saveCollect() {
  const input = document.getElementById('collect-input');
  if (input._field && input.value) {
    contact[input._field] = input.value;
    updateBar();
  }
}

function toggleTip() {
  document.getElementById('tip-content').classList.toggle('open');
}

function goBack() {
  if (history.length > 0) {
    currentStep = history.pop();
    showStep(currentStep);
  }
}

// ── OUTCOME SCREEN ───────────────────────────────────────────────────────────
function showOutcome(type) {
  saveCollect();
  outcomeType = type;

  document.getElementById('script-view').style.display = 'none';
  const os = document.getElementById('outcome-screen');
  os.style.display = 'flex';

  // Set tomorrow as default date
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  const dateStr = tomorrow.toISOString().split('T')[0];
  document.getElementById('rdv-date').value = dateStr;
  document.getElementById('rappel-date').value = dateStr;

  // Pre-fill prenom if collected
  if (contact.prenom) {
    document.getElementById('rdv-prenom').value = contact.prenom;
    document.getElementById('rappel-prenom').value = contact.prenom;
  }

  selectOutcome(type);
}

function selectOutcome(type) {
  outcomeType = type;
  ['rdv','rappel','non'].forEach(t => {
    document.getElementById('tab-' + t).className = 'outcome-tab ' + t + (t === type ? ' active' : '');
    document.getElementById('form-' + t).style.display = t === type ? 'block' : 'none';
  });
}

// ── CREATE CONTACT ────────────────────────────────────────────────────────────
async function createContact(type) {
  if (type === 'non') {
    showSuccess('non');
    return;
  }

  const prenom = document.getElementById(type + '-prenom').value.trim();
  const note   = document.getElementById(type + '-note').value.trim();
  const date   = document.getElementById(type + '-date').value;
  const time   = document.getElementById(type + '-time').value;

  const datetime = date && time ? date + 'T' + time + ':00' : date || null;

  const payload = {
    entreprise:     contact.entreprise,
    nom:            contact.entreprise,
    prenom:         prenom || '',
    telephone:      contact.telephone,
    secteur:        contact.secteur,
    ville:          contact.ville,
    source:         'script-appel',
    statut_contact: type === 'rdv' ? 'rdv' : 'prospect',
    notes:          note || null,
  };

  if (type === 'rdv') {
    payload.date_rdv    = datetime;
    payload.date_prevue = datetime;
    payload.type_rdv    = 'Visite terrain';
  } else {
    payload.date_prevue = datetime;
  }

  try {
    const btn = document.querySelector('.btn-create.' + type);
    btn.disabled = true;
    btn.textContent = 'Création...';

    const res = await fetch(WORKER_URL + '/create-contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (data.success || data.contact_id) {
      showSuccess(type, date, time);
    } else {
      btn.disabled = false;
      btn.textContent = type === 'rdv' ? '✅ Créer la fiche CRM' : '📞 Créer la fiche CRM';
      alert('Erreur : ' + JSON.stringify(data));
    }
  } catch(e) {
    alert('Erreur réseau : ' + e.message);
  }
}

function showSuccess(type, date, time) {
  document.getElementById('outcome-screen').style.display = 'none';
  const ss = document.getElementById('success-screen');
  ss.style.display = 'flex';

  if (type === 'rdv') {
    document.getElementById('success-icon').textContent = '✅';
    document.getElementById('success-title').textContent = 'RDV créé dans le CRM !';
    document.getElementById('success-sub').textContent = `Rendez-vous planifié pour ${contact.entreprise}${date ? ' le ' + formatDate(date) : ''}${time ? ' à ' + time : ''}.`;
  } else if (type === 'rappel') {
    document.getElementById('success-icon').textContent = '📞';
    document.getElementById('success-title').textContent = 'Rappel créé dans le CRM !';
    document.getElementById('success-sub').textContent = `${contact.entreprise} ajouté en prospect avec rappel${date ? ' le ' + formatDate(date) : ''}.`;
  } else {
    document.getElementById('success-icon').textContent = '👋';
    document.getElementById('success-title').textContent = 'Call terminé';
    document.getElementById('success-sub').textContent = 'Pas de suite. Prochain appel !';
    document.querySelector('.btn-crm').style.display = 'none';
  }
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('fr-BE', { weekday: 'long', day: 'numeric', month: 'long' });
}

function resetAll() {
  // Reset contact
  Object.keys(contact).forEach(k => contact[k] = '');
  history = [];
  currentStep = 'intro';
  outcomeType = null;

  // Reset forms
  ['entreprise','telephone','ville'].forEach(f => document.getElementById('f-' + f).value = '');
  document.getElementById('f-secteur').value = '';
  document.querySelector('.btn-crm').style.display = 'block';

  // Show precall
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('outcome-screen').style.display = 'none';
  document.getElementById('script-view').style.display = 'none';
  document.getElementById('precall').style.display = 'flex';
}
</script>
