<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Script Appel — Seolia</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #64748b;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .card {
    background: #1e293b;
    border-radius: 20px;
    padding: 40px 36px;
    max-width: 540px;
    width: 100%;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #3b82f6;
    margin-bottom: 16px;
  }

  .step-label.green { color: #22c55e; }
  .step-label.orange { color: #f97316; }
  .step-label.gray { color: #64748b; }

  .question {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    color: #f1f5f9;
    margin-bottom: 12px;
  }

  .context {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .context em {
    color: #cbd5e1;
    font-style: italic;
  }

  .script-line {
    background: #0f172a;
    border-left: 3px solid #3b82f6;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 15px;
    color: #e2e8f0;
    line-height: 1.6;
    margin-bottom: 28px;
    font-style: italic;
  }

  .script-line.green { border-color: #22c55e; }
  .script-line.orange { border-color: #f97316; }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px 20px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
    line-height: 1.4;
  }

  .btn:hover { transform: translateX(4px); }

  .btn-green {
    background: #16a34a22;
    color: #4ade80;
    border: 1px solid #16a34a55;
  }
  .btn-green:hover { background: #16a34a44; }

  .btn-orange {
    background: #ea580c22;
    color: #fb923c;
    border: 1px solid #ea580c55;
  }
  .btn-orange:hover { background: #ea580c44; }

  .btn-gray {
    background: #33415522;
    color: #94a3b8;
    border: 1px solid #33415555;
  }
  .btn-gray:hover { background: #33415544; }

  .btn-blue {
    background: #1d4ed822;
    color: #60a5fa;
    border: 1px solid #1d4ed855;
  }
  .btn-blue:hover { background: #1d4ed844; }

  .progress {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #334155;
    transition: background 0.3s;
  }
  .dot.active { background: #3b82f6; }
  .dot.done { background: #22c55e; }

  .back-btn {
    margin-top: 24px;
    background: none;
    border: none;
    color: #475569;
    font-size: 13px;
    cursor: pointer;
    padding: 8px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s;
  }
  .back-btn:hover { color: #94a3b8; }

  .final-card {
    text-align: center;
  }

  .final-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .final-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .final-title.green { color: #4ade80; }
  .final-title.gray { color: #64748b; }

  .final-text {
    font-size: 15px;
    color: #94a3b8;
    line-height: 1.7;
    margin-bottom: 32px;
  }

  .restart-btn {
    background: #1e40af;
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: #1d4ed8; }
</style>
</head>
<body>

<div class="logo">Seolia — Script Appel</div>

<div class="card" id="card">
  <!-- Content injected by JS -->
</div>

<script>
const steps = {
  intro: {
    label: "INTRODUCTION",
    labelClass: "",
    question: "Prêt à appeler ?",
    context: "Ton décontracté, pas commercial. Tu n'es pas en train de vendre — tu appelles pour voir si il a un problème que tu peux régler.",
    script: "«\u00a0Bonjour, c'est bien [Nom société]\u00a0?\u00a0»\n«\u00a0C'est vous qui gérez les clients\u00a0?\u00a0»\n«\u00a0Parfait — Florian de Seolia. On travaille avec des [plombiers / électriciens / ...] dans la région, j'aurais juste une petite question si vous avez 2 minutes.\u00a0»",
    answers: [
      { text: "✅ Oui, je l'ai", next: "q1", style: "green" },
      { text: "❌ Mauvaise personne / pas dispo", next: "end_wrong", style: "gray" }
    ],
    progress: [1,0,0,0,0]
  },

  q1: {
    label: "QUESTION 1 — SOURCE CLIENTS",
    labelClass: "",
    question: "D'où viennent ses clients ?",
    script: "«\u00a0Vos nouveaux clients en ce moment — ils vous trouvent comment\u00a0?\u00a0»",
    context: "Vraie curiosité. Écoute pour de vrai. Ne prépare pas ta prochaine phrase pendant qu'il parle — ça s'entend.",
    answers: [
      { text: "Bouche-à-oreille / réseau uniquement", next: "q2", style: "orange" },
      { text: "Google + bouche-à-oreille", next: "q2b", style: "green" },
      { text: "Google principalement", next: "q2b", style: "green" }
    ],
    progress: [2,1,0,0,0]
  },

  q2: {
    label: "TEST GOOGLE",
    labelClass: "",
    question: "Est-il visible sur Google ?",
    script: "«\u00a0Et sur Google — si quelqu'un cherche un [plombier] à [ville] ce soir, il tombe sur vous\u00a0?\u00a0»",
    context: "Pose la question. Ferme ta gueule. Le silence qui suit EST la vente — il se rend compte lui-même qu'il sait pas.",
    answers: [
      { text: "Non / pas vraiment / je sais pas", next: "closing_direct", style: "orange" },
      { text: "Oui, j'ai un site / j'apparais", next: "q3_convertit", style: "green" }
    ],
    progress: [2,2,1,0,0]
  },

  q2b: {
    label: "VOLUME APPELS",
    labelClass: "",
    question: "Est-ce que Google lui génère des appels réguliers ?",
    script: "«\u00a0Et ça vous génère des appels réguliers depuis Google — ou c'est variable\u00a0?\u00a0»",
    context: "Pas de jugement dans la voix. Tu veux juste comprendre la situation.",
    answers: [
      { text: "Régulier, ça tourne bien", next: "q4", style: "green" },
      { text: "Variable / ça pourrait être mieux", next: "closing_direct", style: "orange" }
    ],
    progress: [2,2,1,0,0]
  },

  q3_convertit: {
    label: "CONVERSION CONCRÈTE",
    labelClass: "",
    question: "Combien d'appels par mois depuis le site ?",
    script: "«\u00a0Vous avez une idée du nombre d'appels que ça vous génère par mois depuis le site\u00a0?\u00a0»",
    context: "S'il ne sait pas → ne dis rien. Ce silence là, c'est lui qui réalise qu'il ne mesure même pas ses résultats. C'est le meilleur moment du call.",
    answers: [
      { text: "Peu / pas vraiment / je sais pas", next: "closing_direct", style: "orange" },
      { text: "Oui, ça génère bien des appels", next: "q4", style: "green" }
    ],
    progress: [2,2,2,1,0]
  },

  q4: {
    label: "CAPACITÉ",
    labelClass: "",
    question: "Il peut accepter plus de clients ?",
    script: "«\u00a0Et si vous en aviez plus — vous avez la capacité pour les gérer\u00a0?\u00a0»",
    context: "Question simple. Oui = tu avances vers la visite. Non = tu raccroches proprement sans insister.",
    answers: [
      { text: "Oui, j'en veux plus", next: "closing_direct", style: "green" },
      { text: "Non, je suis à fond", next: "end_full", style: "gray" }
    ],
    progress: [2,2,2,2,1]
  },

  closing_direct: {
    label: "LA VISITE",
    labelClass: "green",
    question: "Annonce la visite — ne la demande pas",
    script: "«\u00a0Je suis par chez vous [jour]. Je passe vous montrer en 20 minutes chrono exactement où vous en êtes sur Google par rapport aux autres [plombiers] de votre zone. Pas de pitch — juste des chiffres concrets. Mardi ou mercredi\u00a0?\u00a0»",
    context: "Choix entre deux jours — jamais oui/non. Ton naturel, comme si tu passais de toute façon dans le coin.",
    answers: [
      { text: "Oui / quel jour ?", next: "end_rdv", style: "green" },
      { text: "J'ai pas le temps", next: "obj_temps", style: "orange" },
      { text: "Envoyez par email", next: "obj_email", style: "orange" },
      { text: "J'ai déjà quelqu'un", next: "obj_deja", style: "orange" }
    ],
    progress: [2,2,2,2,2]
  },

  obj_temps: {
    label: "OBJECTION — TEMPS",
    labelClass: "orange",
    question: "\"J'ai pas le temps\"",
    script: "«\u00a020 minutes — je me déplace chez vous, vous bougez pas. [Jour] matin ou après-midi\u00a0?\u00a0»",
    context: "Court. Pas de justification. La facilité suffit. S'il dit encore non → rappelle dans 2 semaines, sans rancune.",
    answers: [
      { text: "Ok, d'accord", next: "end_rdv", style: "green" },
      { text: "Vraiment pas", next: "end_later", style: "gray" }
    ],
    progress: [2,2,2,2,2]
  },

  obj_email: {
    label: "OBJECTION — EMAIL",
    labelClass: "orange",
    question: "\"Envoyez par email\"",
    script: "«\u00a0C'est visuel — ça marche pas par email. Faut voir en direct sur Google. 20 minutes chez vous, [jour] ça vous irait\u00a0?\u00a0»",
    context: "Ferme mais calme. Pas de ton suppliant. Si il insiste → envoie un email minimaliste et laisse venir.",
    answers: [
      { text: "Ok, d'accord", next: "end_rdv", style: "green" },
      { text: "Non, vraiment par email", next: "end_email", style: "gray" }
    ],
    progress: [2,2,2,2,2]
  },

  obj_deja: {
    label: "OBJECTION — DÉJÀ QUELQU'UN",
    labelClass: "orange",
    question: "\"J'ai déjà quelqu'un\"",
    script: "«\u00a0Ah ok — et ça vous génère des appels depuis Google\u00a0?\u00a0»",
    context: "Rebond direct sur le résultat, pas sur leur prestataire. Tu ne critiques personne. S'il dit oui ça marche bien → félicite et raccroche. S'il hésite → tu as ton ouverture.",
    answers: [
      { text: "Oui ça génère des appels / je suis satisfait", next: "end_satisfied", style: "gray" },
      { text: "Bof / pas vraiment / je sais pas", next: "closing_v2", style: "orange" }
    ],
    progress: [2,2,2,2,2]
  },

  closing_v2: {
    label: "RELANCE — DÉJÀ QUELQU'UN",
    labelClass: "orange",
    question: "Propose quand même la visite",
    script: "«\u00a0C'est pour ça que ça vaut le coup de comparer. 20 minutes chez vous — je vous montre ce qui se passe concrètement. [Jour] ça vous irait\u00a0?\u00a0»",
    context: "Pas de dénigrement du prestataire actuel. Tu proposes juste un point de comparaison neutre.",
    answers: [
      { text: "Ok, pourquoi pas", next: "end_rdv", style: "green" },
      { text: "Non, je reste avec eux", next: "end_satisfied", style: "gray" }
    ],
    progress: [2,2,2,2,2]
  },

  end_rdv: {
    type: "final",
    icon: "🎯",
    finalClass: "green",
    title: "RDV DÉCROCHÉ",
    text: "«\u00a0Parfait — [jour] à [heure] ça vous va\u00a0? Je note ça. C'est à quelle adresse\u00a0?\u00a0»\n\nConfirme par SMS dans la foulée. Note dans ton suivi.",
    progress: [2,2,2,2,2]
  },

  end_full: {
    type: "final",
    icon: "👋",
    finalClass: "gray",
    title: "À FOND — RACCROCHER",
    text: "«\u00a0Ok, pas de problème — si ça change ou si vous cherchez à passer du boulot à quelqu'un de qualifié, n'hésitez pas. Bonne journée\u00a0!\u00a0»\n\nNote pour rappeler dans 3 mois.",
    progress: [2,2,2,2,2]
  },

  end_wrong: {
    type: "final",
    icon: "📵",
    finalClass: "gray",
    title: "MAUVAISE PERSONNE",
    text: "«\u00a0Ah, c'est qui la bonne personne pour ça\u00a0? Je peux le joindre comment\u00a0?\u00a0»\n\nNote le nom et rappelle directement.",
    progress: [1,0,0,0,0]
  },

  end_later: {
    type: "final",
    icon: "🔄",
    finalClass: "gray",
    title: "RAPPELER PLUS TARD",
    text: "«\u00a0Pas de souci — je vous rappelle dans quelques jours. Bonne journée\u00a0!\u00a0»\n\nNote dans ton suivi. Rappelle dans 10-15 jours.",
    progress: [2,2,2,2,2]
  },

  end_email: {
    type: "final",
    icon: "📧",
    finalClass: "gray",
    title: "ENVOYER PAR EMAIL",
    text: "Email ultra court — 3 lignes max :\n• Qui tu es\n• Ce que tu pouvais lui montrer\n• Lien site\n\nPas de pitch. Laisse venir.",
    progress: [2,2,2,2,2]
  },

  end_satisfied: {
    type: "final",
    icon: "✌️",
    finalClass: "gray",
    title: "SATISFAIT — RACCROCHER",
    text: "«\u00a0Très bien, tant mieux. Si un jour ça évolue ou vous voulez comparer, pensez à nous. Bonne journée\u00a0!\u00a0»\n\nRaccrocher sans insister. La relation reste positive.",
    progress: [2,2,2,2,2]
  }
};

let history = [];
let current = 'intro';

function getProgressDots(prog) {
  return prog.map(v => {
    if (v === 2) return '<div class="dot done"></div>';
    if (v === 1) return '<div class="dot active"></div>';
    return '<div class="dot"></div>';
  }).join('');
}

function render(stepId) {
  const step = steps[stepId];
  const card = document.getElementById('card');
  card.innerHTML = '';

  if (step.type === 'final') {
    card.innerHTML = `
      <div class="progress">${getProgressDots(step.progress)}</div>
      <div class="final-card">
        <div class="final-icon">${step.icon}</div>
        <div class="final-title ${step.finalClass}">${step.title}</div>
        <div class="final-text">${step.text.replace(/\n/g, '<br>')}</div>
        <button class="restart-btn" onclick="restart()">↩ Recommencer</button>
      </div>
    `;
    return;
  }

  const scriptLines = step.script.split('\n').map(l =>
    `<div class="script-line ${step.labelClass || ''}">${l}</div>`
  ).join('');

  const answersHtml = step.answers.map(a =>
    `<button class="btn btn-${a.style}" onclick="goTo('${a.next}')">${a.text}</button>`
  ).join('');

  const backBtn = history.length > 0
    ? `<button class="back-btn" onclick="goBack()">← Retour</button>`
    : '';

  card.innerHTML = `
    <div class="progress">${getProgressDots(step.progress)}</div>
    <div class="step-label ${step.labelClass || ''}">${step.label}</div>
    <div class="question">${step.question}</div>
    ${step.context ? `<div class="context">${step.context}</div>` : ''}
    ${scriptLines}
    <div class="answers">${answersHtml}</div>
    ${backBtn}
  `;
}

function goTo(stepId) {
  history.push(current);
  current = stepId;
  render(current);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  current = history.pop();
  render(current);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  history = [];
  current = 'intro';
  render(current);
}

render('intro');
</script>
</body>
</html>
